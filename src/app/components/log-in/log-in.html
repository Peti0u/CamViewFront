<section class="section_login">
  <img src="/logo.png" alt="Logo CamView" class="logo" />
  <form [formGroup]="loginForm" (submit)="onSubmit()">
    <h2>Email</h2>
    <input type="email" placeholder="Email" formControlName="email" />

    <h2>Mot de passe</h2>
    <input type="password" placeholder="Mot de passe" formControlName="password" />

    <p>Mot de passe oublié ?</p>
    <p>
      Pas encore de compte ?
      <a routerLink="/signin">Créez-en un !</a>
    </p>
    <button type="submit" [disabled]="loginForm.invalid">Se connecter</button>

    <!-- Message d'erreur -->
    <div *ngIf="errorMessage()" class="error-message">{{ errorMessage() }}</div>
  </form>
</section>
